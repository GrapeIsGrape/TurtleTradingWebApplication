<!-- Password Modal -->
<div class="modal fade" id="passwordModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="passwordModalTitle">Enter Password</h5>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label for="passwordInput" class="form-label text-xs" style="color:#9ca3af;">Password</label>
          <input type="password" class="form-control" id="passwordInput" placeholder="Enter password">
        </div>
        <div id="passwordError" class="d-none text-xs px-3 py-2 rounded mt-2"
             style="background:rgba(239,68,68,0.12);color:#ef4444;border:1px solid rgba(239,68,68,0.3);">
          Incorrect password. Please try again.
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="bb-btn bb-btn-secondary" id="passwordCancelBtn" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="bb-btn bb-btn-primary" id="submitPassword">Submit</button>
      </div>
    </div>
  </div>
</div>

<script>
  function setupPasswordModal(options = {}) {
    const {
      correctPassword = 'admin',
      onSuccess = () => {},
      onCancel = () => {},
      modalTitle = 'Enter Password',
      canDismiss = true
    } = options;

    document.getElementById('passwordModalTitle').textContent = modalTitle;
    const modal = document.getElementById('passwordModal');
    if (!canDismiss) {
      modal.setAttribute('data-bs-backdrop', 'static');
      modal.setAttribute('data-bs-keyboard', 'false');
    }

    document.getElementById('submitPassword').addEventListener('click', function() {
      const password = document.getElementById('passwordInput').value;
      const errorDiv = document.getElementById('passwordError');
      if (password === correctPassword) {
        errorDiv.classList.add('d-none');
        document.getElementById('passwordInput').value = '';
        bootstrap.Modal.getInstance(modal).hide();
        onSuccess();
      } else {
        errorDiv.classList.remove('d-none');
        document.getElementById('passwordInput').value = '';
      }
    });

    document.getElementById('passwordCancelBtn').addEventListener('click', function() {
      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordError').classList.add('d-none');
      onCancel();
    });

    document.getElementById('passwordInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') document.getElementById('submitPassword').click();
    });
  }
</script>
