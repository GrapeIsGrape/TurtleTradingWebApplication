<!-- Ticker Details Modal -->
<div class="modal fade" id="tickerModal" tabindex="-1" aria-labelledby="tickerModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="tickerModalLabel">Ticker Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <table class="bb-table">
          <tbody>
            <tr>
              <td style="color:#9ca3af;font-size:0.75rem;">Ticker</td>
              <td id="modalTicker" class="font-mono font-bold" style="color:#60a5fa;">-</td>
            </tr>
            <tr>
              <td style="color:#9ca3af;font-size:0.75rem;">Open</td>
              <td id="modalOpen" class="font-mono">-</td>
            </tr>
            <tr>
              <td style="color:#9ca3af;font-size:0.75rem;">Close</td>
              <td id="modalClose" class="font-mono">-</td>
            </tr>
            <tr>
              <td style="color:#9ca3af;font-size:0.75rem;">Current</td>
              <td id="modalCurrent" class="font-mono font-bold" style="color:#10b981;">-</td>
            </tr>
            <tr>
              <td style="color:#9ca3af;font-size:0.75rem;">High</td>
              <td id="modalHigh" class="font-mono">-</td>
            </tr>
            <tr>
              <td style="color:#9ca3af;font-size:0.75rem;">Low</td>
              <td id="modalLow" class="font-mono">-</td>
            </tr>
            <tr>
              <td style="color:#9ca3af;font-size:0.75rem;">Bullish Arrangement</td>
              <td id="modalBullish">-</td>
            </tr>
            <tr>
              <td style="color:#9ca3af;font-size:0.75rem;">ATR-20</td>
              <td id="modalATR" class="font-mono font-bold" style="color:#06b6d4;">-</td>
            </tr>
            <tr>
              <td style="color:#9ca3af;font-size:0.75rem;">Stop Loss</td>
              <td id="modalStopLoss" class="font-mono font-bold" style="color:#ef4444;">-</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="modal-footer">
        <button type="button" class="bb-btn bb-btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
